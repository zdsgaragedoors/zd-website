<!-- CONTACT -->
<section id="contact">
  <div class="reveal">
    <div class="section-label">Get In Touch</div>
    <div class="section-title">Request a <span>Free Quote</span></div>
    <div class="divider"></div>
  </div>

  <div class="contact-grid">

    <!-- LEFT SIDE -->
    <div class="contact-info reveal">

      <p style="color:var(--light); font-size:16px; line-height:1.7; max-width:420px;">
        Ready to get started? Reach out and we'll get back to you quickly with a free, no-obligation estimate.
      </p>

      <!-- PHONE -->
      <div class="contact-item">
        <div class="contact-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e8a020" stroke-width="2" stroke-linecap="round">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 11.5a19.79 19.79 0 01-3.07-8.67A2 2 0 012 .84h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.65a16 16 0 006.29 6.29l1.17-1.16a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
          </svg>
        </div>

        <div>
          <div class="contact-label">Phone</div>
          <div class="contact-value">
            <a href="tel:+16692388609">(669) 238-8609</a>
          </div>
        </div>
      </div>

      <!-- EMAIL -->
      <div class="contact-item">
        <div class="contact-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e8a020" stroke-width="2" stroke-linecap="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>

        <div>
          <div class="contact-label">Email</div>

          <div class="contact-value">
            <a href="mailto:info@zdgaragedoors.com">
              info@zdgaragedoors.com
            </a>
          </div>

        </div>
      </div>

      <!-- HOURS -->
      <div class="contact-item">
        <div class="contact-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e8a020" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12,6 12,12 16,14"/>
          </svg>
        </div>

        <div>
          <div class="contact-label">Hours</div>
          <div class="contact-value">Open 24/7</div>
        </div>
      </div>

    </div>

    <!-- RIGHT SIDE / FORM -->
    <div class="reveal" style="transition-delay:0.2s">

      <form class="contact-form" action="https://formspree.io/f/xgodakqz" method="POST">

        <input type="hidden" name="_subject" value="New Quote Request - ZD Garage Doors" />

        <!-- NAME -->
        <div class="form-group">
          <label>Name</label>

          <input
            type="text"
            name="Name"
            placeholder="Full Name"
            required
          />
        </div>

        <!-- ADDRESS -->
        <div class="form-group">
          <label>Address</label>

          <input
            type="text"
            name="Address"
            placeholder="Project Address"
            required
          />
        </div>

        <!-- PHONE + EMAIL -->
        <div class="form-row">

          <div class="form-group">
            <label>Phone Number</label>

            <input
              type="tel"
              name="Phone"
              placeholder="(669) 238-8609"
              required
            />
          </div>

          <div class="form-group">
            <label>Email</label>

            <input
              type="email"
              name="Email"
              placeholder="customer@email.com"
              required
            />
          </div>

        </div>

        <!-- SERVICE -->
        <div class="form-group">

          <label>Service Needed</label>

          <select name="Service" required>

            <option value="">Select a service...</option>

            <option>Garage Door Installation</option>
            <option>Garage Door Repair</option>
            <option>Commercial Roll-Up Door</option>
            <option>Gate Installation</option>
            <option>Gate Repair</option>
            <option>Emergency Service</option>
            <option>Maintenance / Tune-Up</option>
            <option>Other</option>

          </select>

        </div>

        <!-- DESCRIPTION -->
        <div class="form-group">

          <label>Description</label>

          <textarea
            name="Description"
            placeholder="Describe the garage door or gate project..."
            required
          ></textarea>

        </div>

        <!-- BUTTON -->
        <button type="submit" class="form-submit">
          Request a Quote →
        </button>

      </form>

    </div>

  </div>
</section>
