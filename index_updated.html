<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZD Garage & Gate Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black:   #0e0e0e;
      --dark:    #161616;
      --card:    #1c1c1c;
      --border:  #2a2a2a;
      --gold:    #e8a020;
      --gold2:   #f5c040;
      --white:   #ffffff;
      --gray:    #888888;
      --light:   #cccccc;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--black);
      color: var(--white);
      overflow-x: hidden;
      margin: 0;
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 48px;
      background: rgba(14,14,14,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px; font-weight: 800; letter-spacing: 1px;
      color: var(--white); text-decoration: none;
    }
    .nav-logo span { color: var(--gold); }

    nav ul { list-style: none; display: flex; gap: 36px; margin: 0; padding: 0; }
    nav ul a {
      text-decoration: none; color: var(--light);
      font-size: 14px; font-weight: 500; letter-spacing: 1px;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    nav ul a:hover { color: var(--gold); }

    .nav-cta {
      background: var(--gold); color: var(--black) !important;
      padding: 10px 24px; border-radius: 2px;
      font-weight: 700 !important;
      transition: background 0.2s !important;
    }
    .nav-cta:hover { background: var(--gold2) !important; color: var(--black) !important; }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex; align-items: center;
      padding: 120px 48px 80px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background:
        repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(255,255,255,0.015) 80px, rgba(255,255,255,0.015) 81px),
        repeating-linear-gradient(0deg, transparent, transparent 80px, rgba(255,255,255,0.015) 80px, rgba(255,255,255,0.015) 81px);
    }

    .hero-glow {
      position: absolute; top: -200px; right: -200px;
      width: 700px; height: 700px; border-radius: 50%;
      background: radial-gradient(circle, rgba(232,160,32,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-content { position: relative; max-width: 680px; }

    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(232,160,32,0.1);
      border: 1px solid rgba(232,160,32,0.3);
      color: var(--gold); font-size: 12px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      padding: 6px 16px; border-radius: 2px;
      margin-bottom: 32px;
      opacity: 0; animation: fadeUp 0.6s 0.2s forwards;
    }

    .hero h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(56px, 8vw, 100px);
      font-weight: 800; line-height: 0.95;
      letter-spacing: -1px;
      text-transform: uppercase;
      margin: 0;
      opacity: 0; animation: fadeUp 0.6s 0.4s forwards;
    }
    .hero h1 em { color: var(--gold); font-style: normal; display: block; }

    .hero-sub {
      margin-top: 28px;
      font-size: 17px; font-weight: 300; color: var(--light);
      line-height: 1.7; max-width: 480px;
      opacity: 0; animation: fadeUp 0.6s 0.6s forwards;
    }

    .hero-actions {
      margin-top: 48px; display: flex; gap: 16px; flex-wrap: wrap;
      opacity: 0; animation: fadeUp 0.6s 0.8s forwards;
    }
